[env:trailer_automation_client_s3]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino

; Generate version header before build
extra_scripts = pre:generate_version.py

monitor_speed = 921600
upload_speed = 921600
upload_protocol = esptool
monitor_rts = 0 the projects
monitor_dtr = 0

; LittleFS filesystem configuration
board_build.filesystem = littlefs

; --- ESP32-S3 N16R8 (16MB flash, 8MB PSRAM OPI) memory config ---
; Flash: 16MB QD
board_build.flash_mode = qio
board_upload.flash_size = 16MB

; PSRAM: 8MB OPI
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=0
    ; Enable PSRAM for WiFi and general heap allocations
    -DCONFIG_SPIRAM_USE_MALLOC=1
    -DCONFIG_SPIRAM_CACHE_WORKAROUND=1

lib_deps =
    adafruit/Adafruit SHT31 Library@^2.2.2
    adafruit/Adafruit NeoPixel@^1.12.0
    bblanchon/ArduinoJson@^7.2.0

; Optional: you can set upload_port later in VSCode or here
; upload_port = COM5
; or for Linux:
; upload_port = /dev/ttyACM0
